release:
  classification:
    rules:
      - phase: release
        patterns:
          - '^v?\d+\.\d+\.\d+$'
      - phase: beta
        patterns:
          - '^v?\d+\.\d+\.\d+-rc\d+$'
      - phase: alpha
        patterns:
          - '^dev-[0-9a-f]+$'
    default_phase: release

artifacts:
  socialismus-redis-module:
    file: SocialismusRedis-MODULE-{version}.jar
    platform: bukkit
    loaders:
      - bukkit
      - folia
      - paper
      - purpur
      - spigot
      - velocity
    game_versions: *supported_game_versions

publications: {}
