name: Release build

on:
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to rebuild and republish, for example 2.0.0-RC6
        required: true
        type: string
      publication:
        description: Optional publication name to republish
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.details.outputs.name }}
      version: ${{ steps.details.outputs.version }}
      release-tag: ${{ steps.release.outputs.release-tag }}
      release-name: ${{ steps.release.outputs.release-name }}
      release-body: ${{ steps.release.outputs.release-body }}
      release-url: ${{ steps.release.outputs.release-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release-tag || github.ref }}

      - name: Resolve release metadata
        id: release
        uses: actions/github-script@v8
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release-tag }}
        with:
          script: |
            if (context.eventName === "release") {
              const release = context.payload.release;
              core.setOutput("release-tag", release.tag_name);
              core.setOutput("release-name", release.name || "");
              core.setOutput("release-body", release.body || "");
              core.setOutput("release-url", release.html_url || "");
              return;
            }

            const tag = process.env.INPUT_RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            core.setOutput("release-tag", release.tag_name);
            core.setOutput("release-name", release.name || "");
            core.setOutput("release-body", release.body || "");
            core.setOutput("release-url", release.html_url || "");

      - name: Extract project details
        id: details
        run: |
          echo "name=$(grep 'rootProject.name' settings.gradle.kts | awk -F "=" '{print $2}' | tr -d ' \"\n')" >> $GITHUB_OUTPUT
          echo "version=${{ steps.release.outputs.release-tag }}" | sed 's/^version=v/version=/' >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release-tag }}

      - name: Build project
        uses: ./.github/actions/gradle-build
        env:
          PUBLISH_USER: ${{ secrets.PUBLISH_USER }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUBLISH_REALM: release
        with:
          gradle-command: ./gradlew --no-daemon test build publish

      - name: Create output directory
        run: mkdir output

      - name: Move API
        run: mv redis-common-api/build/libs/redis-common-api-${{ needs.prepare.outputs.version }}.jar output/${{ needs.prepare.outputs.name }}-API-${{ needs.prepare.outputs.version }}.jar

      - name: Move module jar
        run: mv build/libs/${{ needs.prepare.outputs.name }}-${{ needs.prepare.outputs.version }}.jar output/${{ needs.prepare.outputs.name }}-MODULE-${{ needs.prepare.outputs.version }}.jar

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release-tag }}
          files: |
            output/${{ needs.prepare.outputs.name }}-API-${{ needs.prepare.outputs.version }}.jar
            output/${{ needs.prepare.outputs.name }}-MODULE-${{ needs.prepare.outputs.version }}.jar

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Release Artifacts
          path: output/

  resolve-distribution:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      plan-json: ${{ steps.resolve.outputs.plan-json }}
      matrix-json: ${{ steps.resolve.outputs.matrix-json }}

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release-tag }}

      - name: Resolve distribution plan
        id: resolve
        uses: whereareiam/blockops/actions/publish/resolve-distribution-plan@v2
        with:
          release-tag: ${{ needs.prepare.outputs.release-tag }}
          release-name: ${{ needs.prepare.outputs.release-name }}
          release-body: ${{ needs.prepare.outputs.release-body }}
          release-url: ${{ needs.prepare.outputs.release-url }}
          manifest-path: .github/release-distribution.yml
          targets: ${{ inputs.publication }}

  publish-distribution:
    needs:
      - prepare
      - resolve-distribution
    if: ${{ needs.resolve-distribution.outputs.matrix-json != '[]' }}
    name: Publish ${{ matrix.publication.publication }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: distribution-publish
    strategy:
      fail-fast: false
      matrix:
        publication: ${{ fromJson(needs.resolve-distribution.outputs.matrix-json) }}

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: Release Artifacts
          path: output

      - name: Publish distribution
        uses: whereareiam/blockops/actions/publish/publish-publication@v2
        with:
          provider-credentials: |
            modrinth: ${{ secrets.MODRINTH_TOKEN }}
          plan-json: ${{ needs.resolve-distribution.outputs.plan-json }}
          artifact-directory: output
          publication: ${{ matrix.publication.publication }}
