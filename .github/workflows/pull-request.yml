name: Pull request

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

concurrency:
  group: pull-request-${{ github.event_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-release-source:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Verify release pull requests come from dev
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          case "${BASE_REF}" in
            release|release/*)
              if [ "${HEAD_REF}" != "dev" ] || [ "${HEAD_REPO}" != "${REPOSITORY}" ]; then
                echo "Pull requests into ${BASE_REF} must come from the ${REPOSITORY}:dev branch."
                exit 1
              fi
              ;;
          esac

  require-label:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read

    steps:
      - name: Verify pull request has at least one label
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: .+
          use_regex: true
          message: This pull request must have at least one label before it can be merged.

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build project
        uses: ./.github/actions/gradle-build
        with:
          gradle-command: ./gradlew --no-daemon test build
          skip-test-reporter-on-forks: 'true'
