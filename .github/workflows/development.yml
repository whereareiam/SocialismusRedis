name: Development build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  validate-ref:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Reject release refs for manual development publish
        run: |
          case "${GITHUB_REF_NAME}" in
            release|release/*)
              echo "Manual development publish is not allowed from ${GITHUB_REF_NAME}."
              exit 1
              ;;
          esac

  prepare:
    needs: validate-ref
    if: always() && (github.event_name != 'workflow_dispatch' || needs.validate-ref.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.details.outputs.name }}
      version: ${{ steps.details.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract project details
        id: details
        run: |
          echo "name=$(grep 'rootProject.name' settings.gradle.kts | awk -F "=" '{print $2}' | tr -d ' \"\n')" >> $GITHUB_OUTPUT
          branch_name="${GITHUB_REF_NAME//\//-}"
          echo "version=${branch_name}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build project
        uses: ./.github/actions/gradle-build
        env:
          PUBLISH_USER: ${{ secrets.PUBLISH_USER }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PUBLISH_REALM: development
        with:
          gradle-command: ./gradlew --no-daemon test build publish
          ignore-test-failures: 'true'

      - name: Create output directory
        run: mkdir output

      - name: Move API
        run: mv redis-common-api/build/libs/redis-common-api-${{ needs.prepare.outputs.version }}.jar output/${{ needs.prepare.outputs.name }}-API-${{ needs.prepare.outputs.version }}.jar

      - name: Move module jar
        run: mv build/libs/${{ needs.prepare.outputs.name }}-${{ needs.prepare.outputs.version }}.jar output/${{ needs.prepare.outputs.name }}-MODULE-${{ needs.prepare.outputs.version }}.jar

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Build artifacts
          path: output/
